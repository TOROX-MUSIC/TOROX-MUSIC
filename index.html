<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TOROX"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<title>TOROX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
:root{
  --bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;--bg5:#3a3a3c;
  --text:#fff;--text2:rgba(235,235,245,.8);--text3:rgba(235,235,245,.6);--text4:rgba(235,235,245,.3);
  --red:#fc3c44;--sep:rgba(255,255,255,.1);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--font);}
img{display:block;width:100%;height:100%;object-fit:cover;}

/* SCREENS */
.scr{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden;}
.scr.on{display:flex;}

/* ===== ACCESS ===== */
#s-access{background:#000;align-items:center;justify-content:center;padding:40px 32px;}
.ac-logo{font-size:60px;font-weight:900;letter-spacing:-3px;margin-bottom:4px;}
.ac-logo span{color:var(--red);}
.ac-tag{font-size:11px;color:var(--text3);letter-spacing:5px;text-transform:uppercase;margin-bottom:56px;}
.ac-box{width:100%;max-width:280px;}
.ac-lbl{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ac-inp{width:100%;background:var(--bg3);border:1.5px solid var(--bg4);border-radius:10px;padding:14px 16px;color:#fff;font-size:20px;letter-spacing:8px;text-align:center;text-transform:uppercase;outline:none;font-family:var(--font);}
.ac-inp:focus{border-color:var(--red);}
.ac-inp::placeholder{font-size:13px;letter-spacing:2px;color:var(--text4);}
.ac-btn{width:100%;margin-top:12px;padding:15px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;}
.ac-err{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:18px;}
.ac-adm{margin-top:44px;color:var(--text4);font-size:12px;cursor:pointer;}

/* ===== APP ===== */
#s-app{background:#000;}
.tab{display:none;position:absolute;inset:0;bottom:83px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tab::-webkit-scrollbar{display:none;}
.tab.on{display:block;}

/* STICKY HEADER */
.hdr{padding:calc(var(--safe-top) + 50px) 20px 10px;position:sticky;top:0;z-index:50;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;}
.hdr-title{font-size:34px;font-weight:700;letter-spacing:-.5px;}
.hdr-actions{display:flex;gap:10px;align-items:center;}
.hdr-btn{width:34px;height:34px;background:var(--bg3);border:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.hdr-btn svg{width:16px;height:16px;fill:currentColor;}

/* SEARCH BAR */
.srch-wrap{padding:8px 20px 6px;}
.srch{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:10px;padding:9px 14px;}
.srch svg{width:16px;height:16px;fill:var(--text3);flex-shrink:0;}
.srch input{flex:1;background:none;border:none;color:#fff;font-size:16px;outline:none;font-family:var(--font);}
.srch input::placeholder{color:var(--text3);}

/* OFFLINE BANNER */
.offline-banner{margin:10px 20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:14px 16px;border:1px solid rgba(252,60,68,.3);}
.ob-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ob-title{font-size:15px;font-weight:600;}
.ob-sub{font-size:13px;color:var(--text3);margin-bottom:10px;}
.ob-progress{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.ob-fill{height:100%;background:var(--red);border-radius:2px;width:0%;transition:width .3s;}
.ob-status{font-size:12px;color:var(--text3);}
.btn-download{padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-download svg{width:16px;height:16px;fill:#fff;}
.btn-download:disabled{background:var(--bg4);color:var(--text3);}

/* SECTION */
.sec-hdr{display:flex;justify-content:space-between;align-items:baseline;padding:20px 20px 12px;}
.sec-title{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.sec-all{font-size:15px;color:var(--red);}

/* ALBUM SHELF */
.shelf{display:flex;gap:14px;overflow-x:auto;padding:0 20px 4px;-webkit-overflow-scrolling:touch;}
.shelf::-webkit-scrollbar{display:none;}
.alb{flex-shrink:0;width:150px;cursor:pointer;}
.alb-art{width:150px;height:150px;border-radius:12px;background:var(--bg3);overflow:hidden;margin-bottom:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);position:relative;}
.alb-dl{position:absolute;bottom:6px;right:6px;width:28px;height:28px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
.alb-dl svg{width:14px;height:14px;fill:#fff;}
.alb-dl.done{background:rgba(52,199,89,.8);}
.alb-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.alb-sub{font-size:12px;color:var(--text3);margin-top:1px;}

/* SONG ROW */
.srow{display:flex;align-items:center;gap:12px;padding:8px 20px;cursor:pointer;}
.srow:active{background:rgba(255,255,255,.05);}
.srow.pl .sr-t{color:var(--red);}
.sr-art{width:50px;height:50px;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;}
.eq{position:absolute;bottom:3px;right:3px;display:flex;gap:1px;align-items:flex-end;}
.eqb{width:2px;background:var(--red);border-radius:1px;animation:eq .5s ease-in-out infinite alternate;}
.eqb:nth-child(2){animation-delay:.15s;}.eqb:nth-child(3){animation-delay:.3s;}
@keyframes eq{0%{height:3px;}100%{height:10px;}}
.sr-info{flex:1;min-width:0;}
.sr-t{font-size:16px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-m{font-size:13px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-dl{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;display:flex;align-items:center;}
.sr-dl svg{width:18px;height:18px;fill:currentColor;}
.sr-dl.done{color:#34c759;}
.sep{height:.5px;background:var(--sep);margin:0 20px 0 82px;}

/* LIBRARY */
.lib-seg{display:flex;background:var(--bg3);border-radius:9px;margin:0 20px 16px;padding:2px;}
.lib-seg-btn{flex:1;padding:7px;background:none;border:none;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;font-family:var(--font);transition:all .2s;}
.lib-seg-btn.on{background:var(--bg5);color:#fff;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--sep);}
.gcell{background:var(--bg);padding:12px;cursor:pointer;display:flex;gap:12px;align-items:center;}
.gcell:active{background:var(--bg3);}
.g-art{width:48px;height:48px;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.g-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.g-sub{font-size:12px;color:var(--text3);margin-top:2px;}

/* VIDEO */
.vcard{margin:0 20px 12px;border-radius:12px;overflow:hidden;background:var(--bg3);cursor:pointer;}
.vthumb{width:100%;aspect-ratio:16/9;background:var(--bg4);display:flex;align-items:center;justify-content:center;position:relative;}
.vplay{position:absolute;width:48px;height:48px;background:rgba(0,0,0,.65);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.vplay svg{width:20px;height:20px;fill:#fff;margin-left:3px;}
.vinfo{padding:10px 14px 12px;}
.vtitle{font-size:15px;font-weight:500;}
.vmeta{font-size:12px;color:var(--text3);margin-top:2px;}

/* NOW BAR */
.nbar{position:fixed;bottom:83px;left:8px;right:8px;z-index:200;cursor:pointer;transform:translateY(160px);transition:transform .35s cubic-bezier(.32,1.25,.42,1);}
.nbar.on{transform:translateY(0);}
.nbar-inner{background:var(--bg3);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.8);}
.nbar-prog{height:2px;background:var(--bg4);}
.nbar-fill{height:100%;background:var(--red);width:0%;transition:width .5s linear;}
.nbar-body{display:flex;align-items:center;gap:12px;padding:10px 12px;}
.nbar-art{width:46px;height:46px;border-radius:8px;background:var(--bg4);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nbar-info{flex:1;min-width:0;}
.nbar-t{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nbar-a{font-size:12px;color:var(--text3);}
.nbar-ctrls{display:flex;gap:2px;}
.nbar-btn{background:none;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;}
.nbar-btn svg{width:24px;height:24px;fill:currentColor;}

/* TAB BAR */
.tbar{position:fixed;bottom:0;left:0;right:0;height:83px;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--sep);display:flex;justify-content:space-around;align-items:flex-start;padding:10px 0 var(--safe-bot);z-index:300;}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-family:var(--font);padding:2px 16px;min-width:60px;transition:color .15s;}
.tbtn.on{color:var(--red);}
.tbtn svg{width:24px;height:24px;fill:currentColor;}

/* ===== PLAYER ===== */
#s-player{background:#000;}
.pl-bg{position:absolute;inset:0;z-index:0;}
.pl-blur{position:absolute;inset:-40px;background-size:cover;background-position:center;filter:blur(80px);opacity:.6;transition:all 1s;}
.pl-dark{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.4) 40%,rgba(0,0,0,.85) 70%,#000);}
.pl-wrap{position:relative;z-index:1;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.pl-wrap::-webkit-scrollbar{display:none;}

.pl-hdr{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 14px) 20px 0;}
.pl-down{background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.pl-down svg{width:30px;height:30px;fill:rgba(255,255,255,.6);}
.pl-ctx{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;text-align:center;}
.pl-more{background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.pl-more svg{width:22px;height:22px;fill:rgba(255,255,255,.6);}

.pl-art-wrap{padding:24px 28px 20px;flex-shrink:0;}
.pl-art{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:var(--bg3);box-shadow:0 40px 80px rgba(0,0,0,.8);transition:transform .4s cubic-bezier(.32,1.25,.42,1);}
.pl-art.big{transform:scale(1.04);}
.pl-art-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;background:var(--bg3);}

.pl-meta{padding:0 28px 4px;display:flex;justify-content:space-between;align-items:center;}
.pl-txt{flex:1;min-width:0;}
.pl-title{font-size:23px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-artist{font-size:16px;color:var(--text3);margin-top:2px;}
.pl-heart{background:none;border:none;cursor:pointer;padding:8px;flex-shrink:0;}
.pl-heart svg{width:28px;height:28px;fill:var(--text3);}
.pl-heart.lk svg{fill:var(--red);}

.pl-prog{padding:12px 28px 4px;}
.prog-wrap{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative;margin-bottom:6px;}
.prog-fill{height:4px;background:#fff;border-radius:2px;transition:width .3s linear;}
.prog-times{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);}

.pl-ctrls{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px;}
.pc{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px;transition:opacity .15s;}
.pc:active{opacity:.5;}
.pc svg{fill:#fff;}
.pc-sm svg{width:26px;height:26px;fill:rgba(255,255,255,.7);}
.pc-play svg{width:64px;height:64px;}
.pc.on svg{fill:var(--red);}

.pl-vol{padding:0 28px 16px;display:flex;align-items:center;gap:10px;}
.pl-vol svg{width:16px;height:16px;fill:rgba(255,255,255,.5);}
.vol-track{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;}
.vol-fill{height:4px;background:#fff;border-radius:2px;width:80%;}

.pl-extra{display:flex;justify-content:space-evenly;padding:0 20px 20px;}
.pe{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-family:var(--font);}
.pe svg{width:22px;height:22px;fill:currentColor;}

/* QUEUE */
.pl-queue{padding:0 20px 40px;}
.pq-hdr{font-size:18px;font-weight:600;margin-bottom:12px;}
.pq-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:.5px solid var(--sep);cursor:pointer;}
.pq-art{width:42px;height:42px;border-radius:6px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.pq-info{flex:1;min-width:0;}
.pq-name{font-size:14px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pq-meta{font-size:12px;color:var(--text3);}
.pq-dur{font-size:12px;color:var(--text3);}

/* VIDEO PLAYER */
#s-video{background:#000;position:relative;}
#s-video video{width:100%;height:100%;object-fit:contain;}
.v-back{position:absolute;top:calc(var(--safe-top)+14px);left:16px;z-index:10;background:rgba(0,0,0,.6);border:none;color:#fff;cursor:pointer;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.v-back svg{width:20px;height:20px;fill:#fff;}

/* ADMIN */
#s-admin{background:#000;overflow-y:auto;}
.adm{padding:calc(var(--safe-top)+52px) 20px 40px;}
.adm-back{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;font-family:var(--font);margin-bottom:20px;}
.adm-title{font-size:28px;font-weight:700;margin-bottom:4px;}
.adm-sub{color:var(--text3);font-size:14px;margin-bottom:24px;}
.adm-inp{width:100%;background:var(--bg3);border:1.5px solid var(--bg4);border-radius:10px;padding:14px 16px;color:#fff;font-size:15px;outline:none;font-family:var(--font);margin-bottom:12px;}
.adm-inp:focus{border-color:var(--red);}
.adm-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--font);margin-bottom:10px;}
.adm-btn2{background:var(--bg3);color:#fff;}
.ccard{background:var(--bg3);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cval{font-size:20px;font-weight:700;letter-spacing:5px;font-family:monospace;}
.cinfo{font-size:12px;color:var(--text3);margin-top:2px;}
.cbdg{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.bok{background:rgba(52,199,89,.15);color:#34c759;}
.bno{background:rgba(99,99,102,.15);color:var(--text3);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-ico{font-size:52px;margin-bottom:12px;}
.empty p{font-size:17px;font-weight:500;color:var(--text2);}
.empty small{font-size:13px;margin-top:6px;display:block;}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top)+60px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg3);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;transition:transform .3s;white-space:nowrap;border:.5px solid var(--bg4);}
.toast.on{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ACCESS -->
<div class="scr on" id="s-access">
  <div class="ac-logo">TOR<span>OX</span></div>
  <div class="ac-tag">Tu música, sin límites</div>
  <div class="ac-box">
    <div class="ac-lbl">Código de acceso</div>
    <input class="ac-inp" id="inp" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')login()"/>
    <button class="ac-btn" onclick="login()">Entrar</button>
    <div class="ac-err" id="ac-err"></div>
  </div>
  <div class="ac-adm" onclick="S('admin')">⚙️ Panel de administrador</div>
</div>

<!-- APP -->
<div class="scr" id="s-app">

  <!-- HOME -->
  <div class="tab on" id="t-home">
    <div class="hdr">
      <div class="hdr-row">
        <div class="hdr-title" id="greet">TOROX</div>
        <div class="hdr-actions">
          <button class="hdr-btn" onclick="document.getElementById('fm').click()" title="Agregar música">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
          <button class="hdr-btn" onclick="document.getElementById('fv').click()" title="Agregar video">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="srch-wrap">
      <div class="srch">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input id="sinp" placeholder="Artistas, canciones, álbumes" oninput="doSearch(this.value)"/>
      </div>
    </div>

    <!-- OFFLINE BANNER -->
    <div class="offline-banner" id="offline-banner">
      <div class="ob-top">
        <span class="ob-title">⬇️ Música sin internet</span>
        <button class="btn-download" id="dl-btn" onclick="downloadAll()">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Descargar todo
        </button>
      </div>
      <div class="ob-sub" id="dl-sub">Descarga las canciones para escuchar sin conexión</div>
      <div class="ob-progress" id="dl-prog-wrap" style="display:none;">
        <div class="ob-fill" id="dl-fill"></div>
      </div>
      <div class="ob-status" id="dl-status"></div>
    </div>

    <div id="sres" style="display:none;padding-bottom:12px;"></div>
    <div id="hcont">
      <div class="sec-hdr"><span class="sec-title">Álbumes</span></div>
      <div class="shelf" id="shelf"></div>
      <div class="sec-hdr"><span class="sec-title">Canciones</span></div>
      <div id="slist"></div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div class="tab" id="t-library">
    <div class="hdr"><div class="hdr-row"><div class="hdr-title">Biblioteca</div></div></div>
    <div style="padding:8px 20px 0;">
      <div class="lib-seg">
        <button class="lib-seg-btn on" onclick="showLib('albums',this)">Álbumes</button>
        <button class="lib-seg-btn" onclick="showLib('artists',this)">Artistas</button>
        <button class="lib-seg-btn" onclick="showLib('genres',this)">Géneros</button>
      </div>
    </div>
    <div id="libcont"></div>
  </div>

  <!-- VIDEOS -->
  <div class="tab" id="t-videos">
    <div class="hdr">
      <div class="hdr-row">

<script>
var ADMIN='torox2025', songs=[], videos=[], cur=-1, playing=false, shuf=false, rep=false, liked={};
var codes={}, offlineCache={};
try{codes=JSON.parse(localStorage.getItem('tx_codes')||'{}');}catch(e){}
try{offlineCache=JSON.parse(localStorage.getItem('tx_offline')||'{}');}catch(e){}
var ok=localStorage.getItem('tx_ok')==='1';
var IA='https://archive.org/download/';
var ALBUMS=[
  {id:'02-tristeza_202606',title:'Tristeza',artist:'Inquietos Del Vallenato',genre:'Vallenato',cover:'https://archive.org/services/img/02-tristeza_202606/full/pct:500/0/default.jpg',tracks:['01 - Suave Brisa.mp3','02 - Tristeza.mp3','03 - Vete.mp3','04 - Mi Dulce Amor.mp3','05 - No Queda Nada.mp3','06 - Un Millon de Besos.mp3','07 - Buscare Otro Amor.mp3','08 - Me Confie.mp3','09 - No Lo Niegues Mas.mp3','10 - Toma Tu Recuerdo.mp3','11 - Quisiera Ser Como Tu.mp3']},
  {id:'02-tu-historieta',title:'Tu Historieta',artist:'Inquietos Del Vallenato',genre:'Vallenato',cover:'https://archive.org/services/img/02-tu-historieta/full/pct:500/0/default.jpg',tracks:['01 - Solo Amame.mp3','02 - Tu Historieta.mp3','03 - Me Cuesta Tanto.mp3','04 - El Amor Volo.mp3','05 - Dos Locos.mp3','06 - Y Dime.mp3','07 - Te Amare.mp3','08 - Es Mejor Que Termine Todo.mp3','09 - Vine A Pedir Perdon.mp3','10 - Necesito Verte.mp3','11 - No Merezco Tu Perdon.mp3','12 - Me Matara El Sentimiento.mp3']},
  {id:'lenin-ramirez-polvo-rosita',title:'Polvo Rosita',artist:'Lenin Ramírez',genre:'Regional Mexicano',cover:'https://archive.org/services/img/lenin-ramirez-polvo-rosita/full/pct:500/0/default.jpg',tracks:['Lenin Ramírez - Polvo Rosita.mp3']},
  {id:'15-bckpckbyz',title:'Bckpckbyz',artist:'Peso Pluma',genre:'Regional Mexicano',cover:'https://archive.org/services/img/15-bckpckbyz/full/pct:500/0/default.jpg',tracks:['02 - dopamina.mp3','03 - ni pedo.mp3','04 - putielegante.mp3','05 - 7-3.mp3','06 - billete.mp3','07 - daño.mp3','08 - trucha.mp3','09 - morras II.mp3','10 - mezcal.mp3','11 - malibu.mp3','12 - 20s.mp3','13 - viejo lobo.mp3','14 - tu con el.mp3','15 - bckpckbyz.mp3','16 - ganga.mp3','17 - chiclona.mp3','18 - marianita.mp3','19 - london.mp3']}
];

// ===== OFFLINE DOWNLOAD =====
var dlActive=false, dlCount=0, dlTotal=0;

async function downloadAll(){
  if(dlActive) return;
  dlActive=true;
  var btn=document.getElementById('dl-btn');
  btn.disabled=true;
  btn.innerHTML='<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Descargando...';
  document.getElementById('dl-prog-wrap').style.display='block';
  
  var cloudSongs=songs.filter(function(s){return s.cloud;});
  dlTotal=cloudSongs.length; dlCount=0;
  
  for(var i=0;i<cloudSongs.length;i++){
    var s=cloudSongs[i];
    var key=s.url;
    if(offlineCache[key]){dlCount++;updateDlProgress();continue;}
    try{
      document.getElementById('dl-status').textContent='Descargando: '+s.name+' ('+dlCount+'/'+dlTotal+')';
      var resp=await fetch(s.url);
      if(!resp.ok) throw new Error('Error');
      var blob=await resp.blob();
      var reader=new FileReader();
      await new Promise(function(res){reader.onload=function(e){offlineCache[key]=e.target.result;res();};reader.readAsDataURL(blob);});
      dlCount++;
      updateDlProgress();
      // Save periodically
      if(dlCount%5===0) saveOffline();
    }catch(e){dlCount++;updateDlProgress();}
  }
  saveOffline();
  // Update song URLs to local
  songs.forEach(function(s){if(s.cloud&&offlineCache[s.url]){s.localUrl=offlineCache[s.url];}});
  dlActive=false;
  btn.innerHTML='✅ Descargado';
  btn.style.background='#34c759';
  document.getElementById('dl-status').textContent='✅ '+dlCount+' canciones listas para escuchar sin internet';
  toast('✅ Música lista para escuchar sin internet');
}

function updateDlProgress(){
  var pct=(dlCount/dlTotal)*100;
  document.getElementById('dl-fill').style.width=pct+'%';
}

function saveOffline(){
  try{localStorage.setItem('tx_offline',JSON.stringify(offlineCache));}catch(e){
    // Storage full — clear oldest
    offlineCache={};
    toast('⚠️ Almacenamiento lleno, limpiando caché');
  }
}

function getSongUrl(s){
  if(s.localUrl) return s.localUrl;
  if(s.cloud&&offlineCache[s.url]) return offlineCache[s.url];
  return s.url;
}

function loadCloud(){
  ALBUMS.forEach(function(a){
    a.tracks.forEach(function(t){
      var url=IA+a.id+'/'+encodeURIComponent(t);
      songs.push({name:t.replace(/^\d+\s*-\s*/,'').replace('.mp3',''),url:url,artist:a.artist,album:a.title,genre:a.genre,art:a.cover,dur:0,cloud:true});
    });
  });
  // Restore offline URLs
  songs.forEach(function(s){if(s.cloud&&offlineCache[s.url])s.localUrl=offlineCache[s.url];});
  var cached=Object.keys(offlineCache).length;
  if(cached>0){
    document.getElementById('dl-btn').innerHTML='✅ Descargado';
    document.getElementById('dl-btn').style.background='#34c759';
    document.getElementById('dl-status').textContent='✅ '+cached+' canciones disponibles sin internet';
  }
  renderAll();
  toast('☁️ '+songs.length+' canciones cargadas');
}

// ===== SCREENS =====
function S(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});document.getElementById('s-'+id).classList.add('on');if(id==='app')renderAll();}
function swTab(n,btn){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('.tbtn').forEach(function(b){b.classList.remove('on');});document.getElementById('t-'+n).classList.add('on');if(btn)btn.classList.add('on');}

// ===== AUTH =====
function login(){
  var v=document.getElementById('inp').value.trim().toUpperCase();
  var e=document.getElementById('ac-err');
  if(!codes[v]){e.textContent='Código inválido';return;}
  var c=codes[v];
  if(c.expires&&Date.now()>c.expires){e.textContent='Código expirado';return;}
  if(c.uses>=2){e.textContent='Código agotado';return;}
  c.uses++;saveC();localStorage.setItem('tx_ok','1');ok=true;S('app');setGreet();
}
function setGreet(){
  var h=new Date().getHours();
  var g=h<12?'Buenos días ☀️':h<18?'Buenas tardes':' Buenas noches 🌙';
  document.getElementById('greet').textContent=g;
}
function saveC(){localStorage.setItem('tx_codes',JSON.stringify(codes));}
function genCode(){if(document.getElementById('apass').value!==ADMIN){alert('Contraseña incorrecta');return;}var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',code='';for(var i=0;i<4;i++)code+=c[Math.floor(Math.random()*c.length)];codes[code]={uses:0,ts:Date.now()};saveC();renderCodes();}
function genTempCode(){if(document.getElementById('apass').value!==ADMIN){alert('Contraseña incorrecta');return;}var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',code='';for(var i=0;i<4;i++)code+=c[Math.floor(Math.random()*c.length)];codes[code]={uses:0,ts:Date.now(),expires:Date.now()+(48*60*60*1000),temp:true};saveC();renderCodes();toast('⏰ Código temporal generado');}
function renderCodes(){var el=document.getElementById('clist');var ks=Object.keys(codes).reverse();if(!ks.length){el.innerHTML='<p style="color:var(--text3);font-size:14px;">Sin códigos</p>';return;}el.innerHTML=ks.map(function(k){var c=codes[k];var exp=c.expires&&Date.now()>c.expires;var ago=c.uses>=2;var active=!exp&&!ago;var tl='';if(c.temp&&active){var ms=c.expires-Date.now();tl=' · ⏰'+Math.floor(ms/3600000)+'h';}return'<div class="ccard"><div><div class="cval">'+k+'</div><div class="cinfo">'+(c.temp?'Temporal':c.uses+'/2 usos')+tl+'</div></div><span class="cbdg '+(active?'bok':'bno')+'">'+(active?'Activo':exp?'Expirado':'Agotado')+'</span></div>';}).join('');}

// ===== FILES =====
function loadAudio(e){Array.from(e.target.files).forEach(function(f){songs.push({name:f.name.replace(/\.[^/.]+$/,''),url:URL.createObjectURL(f),artist:'Local',album:'Mi Música',genre:'Sin género',art:null,dur:0});});renderAll();toast('🎵 Canciones agregadas');e.target.value='';}
function loadVideo(e){Array.from(e.target.files).forEach(function(f){videos.push({name:f.name.replace(/\.[^/.]+$/,''),url:URL.createObjectURL(f)});});renderVideos();toast('🎬 Videos agregados');e.target.value='';}

// ===== HELPERS =====
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function artImg(s,r){r=r||6;if(s&&s.art)return'<img src="'+s.art+'" style="border-radius:'+r+'px;" onerror="this.style.display=\'none\'"/>';return'';}
function isOffline(s){return !!(s.localUrl||(s.cloud&&offlineCache[s.url]));}

// ===== RENDER =====
function renderAll(){renderShelf();renderSongs();renderVideos();}

function renderShelf(){
  var el=document.getElementById('shelf');
  if(!songs.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:4px 0;">Agrega música con +</div>';return;}
  var a={};songs.forEach(function(s){var k=s.album||'Sin álbum';if(!a[k])a[k]={name:k,art:s.art,count:0,songs:[]};a[k].count++;a[k].songs.push(s);if(!a[k].art&&s.art)a[k].art=s.art;});
  el.innerHTML=Object.values(a).map(function(x){
    var allOff=x.songs.every(isOffline);
    return'<div class="alb" onclick="playAlbum(\''+esc(x.name)+'\')">'
      +'<div class="alb-art">'+(x.art?'<img src="'+x.art+'" onerror="this.style.display=\'none\'"/>':'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;background:var(--bg3);">💿</div>')
      +'</div>'
      +'<div class="alb-name">'+esc(x.name)+'</div>'
      +'<div class="alb-sub">'+x.count+' canciones'+(allOff?' · ⬇️':'')+'</div>'
      +'</div>';
  }).join('');
}

function renderSongs(){
  var el=document.getElementById('slist');
  if(!songs.length){el.innerHTML='<div class="empty"><div class="empty-ico">🎵</div><p>Sin canciones</p><small>Toca + para agregar música</small></div>';return;}
  el.innerHTML=songs.map(function(s,i){
    var isCur=i===cur;
    var off=isOffline(s);
    return'<div class="srow'+(isCur?' pl':'')+'" onclick="playSong('+i+')">'
      +'<div class="sr-art">'+(s.art?'<img src="'+s.art+'" style="border-radius:6px;" onerror="this.style.display=\'none\'"/>':'<span style="font-size:20px;">🎵</span>')
      +(isCur&&playing?'<div class="eq"><div class="eqb"></div><div class="eqb"></div><div class="eqb"></div></div>':'')
      +'</div>'
      +'<div class="sr-info"><div class="sr-t">'+esc(s.name)+'</div><div class="sr-m">'+esc(s.artist)+(off?' · ⬇️':'')+'</div></div>'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+(isCur?'var(--red)':'transparent')+';flex-shrink:0;"></div>'
      +'</div>'
      +(i<songs.length-1?'<div class="sep"></div>':'');
  }).join('');
}

function showLib(type,btn){
  document.querySelectorAll('.lib-seg-btn').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var el=document.getElementById('libcont');
  if(!songs.length){el.innerHTML='<div class="empty"><div class="empty-ico">📚</div><p>Biblioteca vacía</p></div>';return;}
  var g={};songs.forEach(function(s){var k=type==='albums'?s.album:type==='artists'?s.artist:s.genre;if(!k)k='Desconocido';if(!g[k])g[k]={name:k,art:s.art,count:0};g[k].count++;if(!g[k].art&&s.art)g[k].art=s.art;});
  var ico=type==='albums'?'💿':type==='artists'?'👤':'🎼';
  el.innerHTML='<div class="grid">'+Object.keys(g).sort().map(function(k){var x=g[k];return'<div class="gcell" onclick="playGroup(\''+esc(k)+'\',\''+type+'\')">'+'<div class="g-art">'+(x.art?'<img src="'+x.art+'" onerror="this.style.display=\'none\'"/>':ico)+'</div>'+'<div><div class="g-name">'+esc(x.name)+'</div><div class="g-sub">'+x.count+' canciones</div></div></div>';}).join('')+'</div>';
}

function playAlbum(n){var i=songs.findIndex(function(s){return s.album===n;});if(i>=0)playSong(i);}
function playGroup(k,t){var s=songs.find(function(s){return(t==='albums'?s.album:t==='artists'?s.artist:s.genre)===k;});if(s)playSong(songs.indexOf(s));}

function renderVideos(){var el=document.getElementById('vlist');if(!videos.length){el.innerHTML='<div class="empty"><div class="empty-ico">🎬</div><p>Sin videos</p><small>Toca + para agregar</small></div>';return;}el.innerHTML=videos.map(function(v,i){return'<div class="vcard" onclick="playVid('+i+')">'+'<div class="vthumb"><div class="vplay"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#fff;margin-left:3px;"><path d="M8 5v14l11-7z"/></svg></div></div>'+'<div class="vinfo"><div class="vtitle">'+esc(v.name)+'</div><div class="vmeta">TOROX</div></div></div>';}).join('');}
function playVid(i){document.getElementById('vel').src=videos[i].url;document.getElementById('vel').play();S('video');}

function doSearch(q){
  var sr=document.getElementById('sres'),hc=document.getElementById('hcont');
  if(!q.trim()){sr.style.display='none';hc.style.display='block';return;}
  sr.style.display='block';hc.style.display='none';
  var res=songs.filter(function(s){var t=q.toLowerCase();return s.name.toLowerCase().includes(t)||s.artist.toLowerCase().includes(t)||s.album.toLowerCase().includes(t);});
  if(!res.length){sr.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><p>Sin resultados</p></div>';return;}
  sr.innerHTML=res.map(function(s){var i=songs.indexOf(s);return'<div class="srow" onclick="playSong('+i+')">'+'<div class="sr-art">'+(s.art?'<img src="'+s.art+'" style="border-radius:6px;" onerror="this.style.display=\'none\'"/>':'<span style="font-size:20px;">🎵</span>')+'</div>'+'<div class="sr-info"><div class="sr-t">'+esc(s.name)+'</div><div class="sr-m">'+esc(s.artist)+'</div></div></div>';}).join('');
}

// ===== PLAYBACK =====
var aud=document.getElementById('aud');
function playSong(i){cur=i;var s=songs[i];aud.src=getSongUrl(s);aud.play().catch(function(){});playing=true;updateUI();renderSongs();renderQueue();S('player');}
function togglePlay(){if(cur<0&&songs.length>0){playSong(0);return;}if(cur<0)return;if(playing){aud.pause();playing=false;}else{aud.play().catch(function(){});playing=true;}updateBtns();renderSongs();}
function nextSong(){if(!songs.length)return;playSong(shuf?Math.floor(Math.random()*songs.length):(cur+1)%songs.length);}
function prevSong(){if(!songs.length)return;if(aud.currentTime>3){aud.currentTime=0;return;}playSong((cur-1+songs.length)%songs.length);}
function toggleShuffle(){shuf=!shuf;document.getElementById('shuf').classList.toggle('on',shuf);toast(shuf?'🔀 Aleatorio ON':'Aleatorio OFF');}
function toggleRepeat(){rep=!rep;document.getElementById('rep').classList.toggle('on',rep);toast(rep?'🔁 Repetir ON':'Repetir OFF');}
function toggleLike(){liked[cur]=!liked[cur];var h=document.getElementById('heart');h.classList.toggle('lk',liked[cur]);h.querySelector('svg').innerHTML=liked[cur]?'<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>':'<path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/>';toast(liked[cur]?'❤️ Guardada':'Eliminada de favoritos');}

function updateUI(){
  if(cur<0)return;
  var s=songs[cur];
  document.getElementById('pl-t').textContent=s.name;
  document.getElementById('pl-a').textContent=s.artist+' · '+s.album;
  document.getElementById('nb-t').textContent=s.name;
  document.getElementById('nb-a').textContent=s.artist;
  var pa=document.getElementById('pl-art');
  var ph=document.getElementById('pl-art-ph');
  if(s.art){
    var img=pa.querySelector('img');
    if(!img){img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover;';img.onerror=function(){this.style.display='none';ph.style.display='flex';};pa.appendChild(img);}
    img.src=s.art;img.style.display='block';ph.style.display='none';
    document.getElementById('pl-blur').style.backgroundImage='url('+s.art+')';
  }else{var img2=pa.querySelector('img');if(img2)img2.style.display='none';ph.style.display='flex';document.getElementById('pl-blur').style.backgroundImage='none';}
  var na=document.getElementById('nb-art');
  if(s.art)na.innerHTML='<img src="'+s.art+'" style="width:46px;height:46px;object-fit:cover;border-radius:8px;" onerror="this.textContent=\'🎵\'"/>';
  else na.textContent='🎵';
  document.getElementById('nbar').classList.add('on');
  document.getElementById('heart').classList.toggle('lk',!!liked[cur]);
  updateBtns();
}

function updateBtns(){
  var pi=document.getElementById('play-ico');
  pi.innerHTML=playing?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
  document.getElementById('nb-play').innerHTML=playing?'<svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>':'<svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:#fff"><path d="M8 5v14l11-7z"/></svg>';
  document.getElementById('pl-art').classList.toggle('big',playing);
}

function renderQueue(){
  var el=document.getElementById('queue');
  if(!songs.length){el.innerHTML='';return;}
  var next=songs.slice(cur+1,cur+6);
  el.innerHTML=next.map(function(s,i){
    var idx=cur+1+i;
    return'<div class="pq-row" onclick="playSong('+idx+')">'
      +'<div class="pq-art">'+(s.art?'<img src="'+s.art+'" style="border-radius:6px;" onerror="this.style.display=\'none\'"/>':'<span style="font-size:16px;">🎵</span>')+'</div>'
      +'<div class="pq-info"><div class="pq-name">'+esc(s.name)+'</div><div class="pq-meta">'+esc(s.artist)+'</div></div>'
      +'<div class="pq-dur">'+fmtT(s.dur)+'</div>'
      +'</div>';
  }).join('');
}

aud.addEventListener('timeupdate',function(){
  if(!aud.duration)return;
  var p=(aud.currentTime/aud.duration)*100;
  document.getElementById('prog-fill').style.width=p+'%';
  document.getElementById('nb-fill').style.width=p+'%';
  document.getElementById('tc').textContent=fmtT(aud.currentTime);
  document.getElementById('td').textContent=fmtT(aud.duration);
});
aud.addEventListener('ended',function(){if(rep){aud.currentTime=0;aud.play();}else nextSong();});
function seekTo(e){var r=document.getElementById('prog').getBoundingClientRect();var p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));if(aud.duration)aud.currentTime=p*aud.duration;}
function setVol(e){var r=e.currentTarget.getBoundingClientRect();var p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));aud.volume=p;document.getElementById('vfill').style.width=(p*100)+'%';}
function fmtT(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60);}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}

if('serviceWorker' in navigator){var sw="const C='torox-v5';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));";var b=new Blob([sw],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(function(){});}

if(ok){S('app');setGreet();loadCloud();}
</script>
